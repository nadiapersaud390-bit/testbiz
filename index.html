<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZ Level Up Dashboard | Live Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="p-4 pb-20">

<script>
if (sessionStorage.getItem('agentLoggedIn') !== '1') {
    window.location.replace('agent-login.html');
}
function logoutUser() {
    sessionStorage.clear();
    window.location.replace('agent-login.html');
}
</script>

<button onclick="logoutUser()" title="Log Out" style="position:fixed;top:10px;right:12px;z-index:9999;padding:6px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.18);background:rgba(2,6,23,0.75);color:#f8fafc;font-size:11px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(6px);">Log Out</button>

<div id="agent-session-banner" style="max-width:980px;margin:8px auto 12px;"></div>

<script type="module" src="js/firebase.js"></script>

<div id="broadcast-bar">
  <div class="bc-inner">
    <span class="bc-icon">📢</span>
    <div class="bc-text" id="bc-message-text">Admin message here</div>
    <button class="bc-close" onclick="dismissBroadcast()" title="Close">✕</button>
  </div>
</div>

<div id="lead-alert-banner">
  <div class="lab-inner">
    <span class="lab-icon" id="lab-icon">🔥</span>
    <div class="lab-text">
        <div id="lead-alert-title" style="font-weight: 900; letter-spacing: 0.1em; color: #fff;">NEW TEAM LEAD!</div>
        <div id="lead-alert-body" style="font-size: 13px; color: rgba(255,255,255,0.8);"></div>
        <div id="lab-text" class="hidden"></div> 
    </div>
    <button class="lab-close" onclick="dismissLeadAlert()" title="Close">✕</button>
  </div>
</div>

<button id="bc-admin-btn" class="hidden" onclick="toggleBcPanel()" title="Broadcast Admin">📣</button>
<button id="bc-float-btn" onclick="toggleBcPanel()" title="Admin Panel">📣</button>

<div id="bc-panel">
  <div class="bc-panel-title"><span>📢</span> Admin Broadcast</div>
  <textarea id="bc-input" class="bc-msg-input" rows="3" placeholder="Type your message to everyone..."></textarea>
  <button class="bc-send-btn" onclick="sendBroadcast()">⚡ Send to Everyone</button>
  <button class="bc-clear-btn" onclick="clearBroadcast()">🗑 Clear Message</button>
  <button class="bc-clear-btn" onclick="dismissLeadAlert()" style="margin-top:4px;color:#c084fc;border-color:rgba(168,85,247,0.3);">🔥 Clear Lead Alert</button>
  <div id="bc-status" class="bc-status"></div>
</div>

<div id="bc-login-modal" class="hidden">
  <div class="modal-box">
    <div class="header-font text-xs text-red-500 tracking-widest uppercase mb-2 italic">📢 Admin Access</div>
    <div class="header-font text-2xl font-black text-white uppercase italic tracking-tight">Broadcast</div>
    <input id="bc-pw-input" type="password" class="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkBcPassword()" autocomplete="off"/>
    <button class="pw-btn" onclick="checkBcPassword()"><i class="fas fa-broadcast-tower mr-2"></i>Unlock</button><br>
    <button class="pw-cancel" onclick="document.getElementById('bc-login-modal').classList.add('hidden')">Cancel</button>
  </div>
</div>

<canvas id="tp-confetti-canvas"></canvas>
<div id="top-performer-modal" class="hidden">
  <div class="tp-box">
    <div class="tp-header">
      <span class="tp-crown">👑</span>
      <div class="tp-title">Top Performers</div>
      <div class="tp-subtitle" id="tp-time-label">Last 2 Hours</div>
    </div>
    <div class="tp-list" id="tp-list"></div>
    <div class="tp-footer"><button class="tp-close-btn" onclick="closeTopPerformer()">✕ Close</button></div>
  </div>
</div>

<div id="pw-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="header-font text-xs text-yellow-500 tracking-widest uppercase mb-2 italic">Access Required</div>
        <div class="header-font text-2xl font-black text-white uppercase italic tracking-tight">Weekly Rankings</div>
        <input id="pw-input" type="password" class="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()" autocomplete="off"/>
        <button class="pw-btn" onclick="checkPassword()"><i class="fas fa-unlock mr-2"></i>Unlock</button><br>
        <button class="pw-cancel" onclick="cancelPassword()">Cancel</button>
    </div>
</div>

<div class="main-container max-w-lg mx-auto transition-all duration-500">
    <div class="flex justify-between items-center mb-8 px-2">
        <div class="flex items-center">
            <span class="live-pulse"></span>
            <div class="flex flex-col">
                <span class="text-[10px] md:text-xs font-black tracking-widest text-red-500 uppercase italic leading-none">Live System Performance</span>
                <span id="timestamp" class="text-[8px] md:text-sm text-slate-500 font-bold uppercase mt-1">Syncing Data...</span>
            </div>
        </div>
        <button onclick="updateDashboard()" id="refresh-btn" class="glass p-3 px-4 rounded-xl hover:bg-white/10 transition-all active:scale-95">
            <i class="fas fa-sync-alt text-sm text-blue-400"></i>
        </button>
    </div>

    <div class="text-center mb-10">
        <h1 class="header-font text-4xl md:text-6xl font-black tracking-tighter bg-gradient-to-r from-yellow-400 via-orange-500 to-red-600 bg-clip-text text-transparent italic leading-tight uppercase" id="main-title">BIZ Level Up Dashboard</h1>
        <div style="display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap;">
            <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 18px;display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.2rem;">🇬🇾</span>
                <div><div id="clock-guyana" style="font-size:20px;font-weight:900;color:#facc15;">--:-- --</div></div>
            </div>
            <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 18px;display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.2rem;">🇺🇸</span>
                <div><div id="clock-california" style="font-size:20px;font-weight:900;color:#38bdf8;">--:-- --</div></div>
            </div>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;padding:0 8px;max-width:42rem;margin-left:auto;margin-right:auto;">
        <button onclick="switchTab('daily')" id="tab-daily" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all tab-active">Daily</button>
        <button onclick="switchTab('lookup')" id="tab-lookup" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500">Lookup</button>
        <button onclick="switchTab('playbook')" id="tab-playbook" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500">Playbook</button>
        <button onclick="switchTab('rebuttals')" id="tab-rebuttals" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500" style="color:#14b8a6;">💬 Rebuttals</button>
        <button onclick="switchTab('prank')" id="tab-prank" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500" style="color:#a855f7;">🚨 Prank</button>
        <button onclick="requestWeekly()" id="tab-weekly" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500">Weekly</button>
        <button onclick="switchTab('trivia')" id="tab-trivia" class="glass py-3 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-widest transition-all text-slate-500" style="color:#f59e0b;grid-column:1/-1;">🎯 Trivia Blitz</button>
    </div>

    <div id="leaderboard-view" data-tab-src="tabs/leaderboard.html"></div>
    <div id="lookup-view" class="hidden" data-tab-src="tabs/lookup.html"></div>
    <div id="playbook-view" class="hidden" data-tab-src="tabs/playbook.html"></div>
    <div id="rebuttals-view" class="hidden" data-tab-src="tabs/rebuttals.html"></div>
    <div id="prank-view" class="hidden" data-tab-src="tabs/prank.html"></div>
    <div id="trivia-view" class="hidden" data-tab-src="tabs/trivia.html"></div>
</div>

<audio id="alert-sound-public" src="assets/sounds/public_alert.mp3" preload="auto"></audio>
<audio id="alert-sound-private" src="assets/sounds/private_alert.mp3" preload="auto"></audio>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/playbook.js"></script>
<script src="js/session-banner.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/dnc.js"></script>
<script src="js/lookup.js"></script>
<script src="js/trivia.js"></script>
<script src="js/broadcast.js"></script>
<script src="js/leadalerts.js"></script> <script src="js/topperformer.js"></script>

<script>
    const _loadedTabs = new Set();
    async function loadTab(tabId) {
        if (_loadedTabs.has(tabId)) return;
        const el = document.getElementById(tabId);
        if (!el) return;
        const src = el.getAttribute('data-tab-src');
        if (!src) return;
        try {
            const res = await fetch(src);
            if (!res.ok) throw new Error('Failed to load ' + src);
            el.innerHTML = await res.text();
            _loadedTabs.add(tabId);
        } catch(e) { console.warn('Tab load failed', e); }
    }
    const _origSwitchTab = window.switchTab;
    window.switchTab = async function(tab) {
        const tabViewMap = { daily: 'leaderboard-view', lookup: 'lookup-view', playbook: 'playbook-view', rebuttals: 'rebuttals-view', prank: 'prank-view', trivia: 'trivia-view', weekly: 'leaderboard-view' };
        const viewId = tabViewMap[tab];
        if (viewId) await loadTab(viewId);
        _origSwitchTab(tab);
    };
    document.addEventListener('DOMContentLoaded', async () => {
        await loadTab('leaderboard-view');
        updateDashboard();
    });
</script>

</body>
</html>
