    <style>
        /* ── RESPONSIVE ZOOM FIX ── */

        /* Main container: fluid width, generous max, never clips */
        .main-container {
            width: 100%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 clamp(8px, 2vw, 24px);
            box-sizing: border-box;
        }

        /* Tab grid — always 3 equal columns */
        .tab-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(4px, 1vw, 10px);
            margin-bottom: clamp(4px, 1vw, 10px);
            padding: 0;
            width: 100%;
            box-sizing: border-box;
        }

        /* Buttons: fluid text, never overflow */
        .tab-grid button {
            width: 100%;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: clamp(8px, 1.2vw, 13px) !important;
            padding: clamp(8px, 1.2vw, 14px) clamp(4px, 0.8vw, 10px) !important;
            box-sizing: border-box;
        }

        /* Icon inside buttons */
        .tab-grid button i {
            font-size: clamp(7px, 1vw, 11px) !important;
        }

        /* Full-width row (Super Admin) */
        .tab-grid-full {
            grid-column: 1 / -1;
        }

        /* Day sub-tabs fluid */
        #day-sub-tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(4px, 1vw, 8px);
        }

        .day-sub-tab {
            font-size: clamp(8px, 1vw, 11px) !important;
            padding: clamp(4px, 0.6vw, 7px) clamp(8px, 1.2vw, 14px) !important;
        }

        /* Leaderboard grid: 2 cols at normal zoom, scales with zoom */
        #leaderboard {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: 14px !important;
        }
        @media(min-width:1800px) {
            #leaderboard { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important; }
        }
        @media(max-width:640px) {
            #leaderboard { grid-template-columns: 1fr !important; }
        }

        /* Each leaderboard card fills its cell */
        #leaderboard > div {
            min-width: 0;
            box-sizing: border-box;
        }

        /* Stats bar: auto-fit, always fills width */
        .stats-bar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(160px, 40vw), 1fr));
            gap: clamp(6px, 1.2vw, 14px);
        }

        /* Hide elements gracefully */
        .hidden-tab {
            display: none !important;
        }
    </style>
</head>
<body class="p-4 pb-20">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
if (sessionStorage.getItem('agentLoggedIn') !== '1' && sessionStorage.getItem('adminLoggedIn') !== 'true') {
    window.location.replace('agent-login.html');
}

async function logAdminActivity(action, details) {
    if (sessionStorage.getItem('bizUserRole') !== 'admin') return;

    try {
        if (typeof window.writeAdminActivityLog === 'function') {
            window.writeAdminActivityLog(action, details);
        }
    } catch (e) {}
}

async function logoutUser() {
    await logAdminActivity('logout', 'Admin logged out');
    sessionStorage.clear();
    window.location.replace('agent-login.html');
}

function dismissLeadAlert() {
    const banner = document.getElementById('lead-alert-banner');
    if (banner) banner.style.display = 'none';
    document.body.style.paddingTop = '0px';
}

// Function to show/hide tabs based on user role
function setupRoleBasedTabs() {
    const userRole = sessionStorage.getItem('bizUserRole');
    const currentAdmin = JSON.parse(sessionStorage.getItem('currentAdmin') || '{}');
    const isSuper = currentAdmin.role === 'super_admin' || currentAdmin.isSuper;
    const restrictedIds = (window._RESTRICTED_ADMIN_IDS || ['0000']).map(s => String(s).toLowerCase());
    const adminEmailLower = String(currentAdmin.email || '').toLowerCase();
    const isRestrictedAdmin = userRole === 'admin' && restrictedIds.includes(adminEmailLower);
    const isRegularAdmin = userRole === 'admin' && !isSuper && !isRestrictedAdmin;
    
    // Get all tab buttons
    const tabs = {
        daily: document.getElementById('tab-daily'),
        lookup: document.getElementById('tab-lookup'),
        playbook: document.getElementById('tab-playbook'),
        rebuttals: document.getElementById('tab-rebuttals'),
        prank: document.getElementById('tab-prank'),
        weekly: document.getElementById('tab-weekly'),
        trivia: document.getElementById('tab-trivia'),
        tracker: document.getElementById('tab-tracker'),
        adminpanel: document.getElementById('tab-adminpanel'),
        superadminpanel: document.getElementById('tab-superadminpanel')
    };
    
    // For Restricted Admin (e.g. 0000) - hide Admin Tools, Super Admin AND Tracker
    if (isRestrictedAdmin) {
        if (tabs.adminpanel) tabs.adminpanel.classList.add('hidden');
        if (tabs.superadminpanel) tabs.superadminpanel.classList.add('hidden');
        if (tabs.tracker) tabs.tracker.classList.add('hidden');
    }
    // For Regular Admin (momo) - show Admin Tools but NOT Super Admin
    else if (isRegularAdmin) {
        if (tabs.adminpanel) tabs.adminpanel.classList.remove('hidden');
        if (tabs.superadminpanel) tabs.superadminpanel.classList.add('hidden');
    }
    // For Super Admin (rose) - show both Admin Tools AND Super Admin
    else if (isSuper) {
        if (tabs.adminpanel) tabs.adminpanel.classList.remove('hidden');
        if (tabs.superadminpanel) tabs.superadminpanel.classList.remove('hidden');
    }
    // For non-admin users - hide admin tabs
    else {
        if (tabs.adminpanel) tabs.adminpanel.classList.add('hidden');
        if (tabs.superadminpanel) tabs.superadminpanel.classList.add('hidden');
    }
    
    // Ensure all buttons have proper styling
    Object.values(tabs).forEach(tab => {
        if (tab && !tab.classList.contains('hidden')) {
            tab.classList.add('glass', 'py-3', 'rounded-xl', 'font-black', 'uppercase', 'tracking-widest', 'transition-all');
            tab.classList.remove('hidden-tab');
        }
    });
}

// Call setup when DOM loads
document.addEventListener('DOMContentLoaded', setupRoleBasedTabs);
</script>

<script>
const _loadedTabs = new Set();

async function loadTab(tabId) {
    if (_loadedTabs.has(tabId)) return;

    const el = document.getElementById(tabId);
    if (!el) return;

    const src = el.getAttribute('data-tab-src');
    if (!src) return;

    try {
        const res = await fetch(src);
        if (!res.ok) throw new Error('Failed to load ' + src);

        const html = await res.text();
        el.innerHTML = html;

        const scripts = el.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            Array.from(oldScript.attributes).forEach(attr => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.text = oldScript.text;
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });

        _loadedTabs.add(tabId);
    } catch(e) {
        console.warn('Tab load failed for', tabId, e);
    }
}

const _origSwitchTab = window.switchTab;

window.switchTab = async function(tab) {
    const tabViewMap = {
        daily: 'leaderboard-view',
        lookup: 'lookup-view',
        playbook: 'playbook-view',
        rebuttals: 'rebuttals-view',
        prank: 'prank-view',
        trivia: 'trivia-view',
        adminpanel: 'adminpanel-view',
        superadminpanel: 'superadminpanel-view',
        agentstats: 'agentstats-view',
        agentprofiles: 'agentprofiles-view',
        tracker: 'tracker-view',
        weekly: 'leaderboard-view'
    };

    if (sessionStorage.getItem('bizUserRole') === 'admin') {
        await logAdminActivity('tab_click', 'Clicked tab: ' + tab);
    }

    const viewId = tabViewMap[tab];
    if (viewId) await loadTab(viewId);

    _origSwitchTab(tab);
};

document.addEventListener('DOMContentLoaded', () => {
    const userRole = sessionStorage.getItem('bizUserRole');
    const currentAdmin = JSON.parse(sessionStorage.getItem('currentAdmin') || '{}');
    const isSuper = currentAdmin.role === 'super_admin' || currentAdmin.isSuper;
    const restrictedIds = (window._RESTRICTED_ADMIN_IDS || ['0000']).map(s => String(s).toLowerCase());
    const adminEmailLower = String(currentAdmin.email || '').toLowerCase();
    const isRestrictedAdmin = userRole === 'admin' && restrictedIds.includes(adminEmailLower);
    const isRegularAdmin = userRole === 'admin' && !isSuper && !isRestrictedAdmin;
    
    console.log('DOM Loaded - User:', currentAdmin.email, 'Role:', userRole, 'isSuper:', isSuper, 'isRestricted:', isRestrictedAdmin);
    
    // Get tab elements
    const adminTab = document.getElementById('tab-adminpanel');
    const superAdminTab = document.getElementById('tab-superadminpanel');
    const trackerTab = document.getElementById('tab-tracker');
    
    // For Restricted Admin (e.g. 0000) - hide Admin Tools, Super Admin, AND Tracker
    if (isRestrictedAdmin) {
        if (adminTab) adminTab.classList.add('hidden');
        if (superAdminTab) superAdminTab.classList.add('hidden');
        if (trackerTab) trackerTab.classList.add('hidden');
        console.log('Restricted Admin - Hiding Admin Tools, Super Admin and Tracker');
    }
    // For Regular Admin (momo) - show Admin Tools only
    else if (isRegularAdmin) {
        if (adminTab) {
            adminTab.classList.remove('hidden');
            console.log('Regular Admin - Showing Admin Tools');
        }
        if (superAdminTab) {
            superAdminTab.classList.add('hidden');
            console.log('Regular Admin - Hiding Super Admin');
        }
    }
    // For Super Admin (rose) - show both
    else if (isSuper) {
        if (adminTab) {
            adminTab.classList.remove('hidden');
            console.log('Super Admin - Showing Admin Tools');
        }
        if (superAdminTab) {
            superAdminTab.classList.remove('hidden');
            console.log('Super Admin - Showing Super Admin');
        }
    }
    // For non-admin users - hide both
    else {
        if (adminTab) adminTab.classList.add('hidden');
        if (superAdminTab) superAdminTab.classList.add('hidden');
    }

    // Load the leaderboard tab
    loadTab('leaderboard-view');
});

// Re-run role-based setup when storage changes (in case of login state change)
window.addEventListener('storage', () => {
    setupRoleBasedTabs();
});
</script>
