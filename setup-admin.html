<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Super Admin | BIZ Level Up</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white/5 border border-white/10 rounded-2xl p-8">
        <h1 class="text-2xl font-black text-yellow-400 uppercase tracking-wider mb-2">Setup Super Admin</h1>
        <p class="text-slate-400 text-sm mb-6">Run this ONCE to create your first super admin account.</p>
        
        <div id="status" class="text-sm mb-4"></div>
        
        <input type="email" id="email" placeholder="admin@yourdomain.com" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white mb-3">
        <input type="password" id="password" placeholder="Password (min 6 chars)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white mb-4">
        
        <button onclick="createSuperAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-black py-3 rounded-xl uppercase tracking-wider">Create Super Admin</button>
        
        <p class="text-slate-500 text-xs mt-4 text-center">After setup, delete this file from your server.</p>
    </div>
    
    <script src="js/firebase-config.js"></script>
    <script>
        async function createSuperAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            
            if (!email || !password) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ Email and password required</span>';
                return;
            }
            
            if (password.length < 6) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ Password must be at least 6 characters</span>';
                return;
            }
            
            statusDiv.innerHTML = '<span class="text-yellow-400">⏳ Creating super admin...</span>';
            
            try {
                // Create user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // Add to Firestore as super_admin
                await db.collection('admins').doc(email).set({
                    email: email,
                    role: 'super_admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await auth.signOut();
                statusDiv.innerHTML = '<span class="text-green-400">✅ Super admin created! You can now login at admin-login.html</span>';
            } catch (error) {
                statusDiv.innerHTML = `<span class="text-red-400">❌ Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
