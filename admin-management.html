<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management | BIZ Level Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; }
        .admin-card { transition: all 0.3s ease; }
        .admin-card:hover { transform: translateX(5px); background: rgba(255,255,255,0.08); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent uppercase">
                    <i class="fas fa-users-cog mr-2"></i>Admin Management
                </h1>
                <p id="admin-info" class="text-slate-400 text-sm mt-1"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='index.html'" 
                        class="bg-blue-500/20 border border-blue-500/30 px-4 py-2 rounded-xl text-blue-400 text-sm font-bold">
                    <i class="fas fa-tachometer-alt mr-1"></i> Dashboard
                </button>
                <button onclick="handleLogout()" 
                        class="bg-red-500/20 border border-red-500/30 px-4 py-2 rounded-xl text-red-400 text-sm font-bold">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </button>
            </div>
        </div>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gradient-to-br from-yellow-500/10 to-orange-500/10 border border-yellow-500/20 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs uppercase tracking-wider">Total Admins</p>
                        <p id="total-admins" class="text-3xl font-black text-yellow-400">0</p>
                    </div>
                    <i class="fas fa-users text-4xl text-yellow-500/30"></i>
                </div>
            </div>
            <div class="bg-gradient-to-br from-purple-500/10 to-pink-500/10 border border-purple-500/20 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs uppercase tracking-wider">Super Admins</p>
                        <p id="super-admin-count" class="text-3xl font-black text-purple-400">0</p>
                    </div>
                    <i class="fas fa-crown text-4xl text-purple-500/30"></i>
                </div>
            </div>
            <div class="bg-gradient-to-br from-green-500/10 to-emerald-500/10 border border-green-500/20 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs uppercase tracking-wider">Regular Admins</p>
                        <p id="regular-admin-count" class="text-3xl font-black text-green-400">0</p>
                    </div>
                    <i class="fas fa-user-shield text-4xl text-green-500/30"></i>
                </div>
            </div>
        </div>
        
        <!-- Add Admin Section (Super Admin only) -->
        <div id="add-admin-section" class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-8 hidden">
            <h2 class="text-xl font-bold text-white mb-4">
                <i class="fas fa-plus-circle text-green-400 mr-2"></i>Add New Admin
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="new-admin-name" placeholder="Full Name" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                <input type="email" id="new-admin-email" placeholder="Email Address" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                <input type="password" id="new-admin-password" placeholder="Password (min 6 chars)" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                <select id="new-admin-role" class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                    <option value="admin">Regular Admin</option>
                    <option value="super_admin">Super Admin</option>
                </select>
            </div>
            <button onclick="addNewAdmin()" 
                    class="mt-4 bg-green-500/20 border border-green-500/30 px-6 py-2 rounded-xl text-green-400 font-bold hover:bg-green-500/30 transition">
                <i class="fas fa-user-plus mr-2"></i> Add Admin
            </button>
            <div id="add-status" class="text-sm mt-2"></div>
        </div>
        
        <!-- Change Password Section -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-8">
            <h2 class="text-xl font-bold text-white mb-4">
                <i class="fas fa-key text-blue-400 mr-2"></i>Change Your Password
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="password" id="old-password" placeholder="Current Password" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                <input type="password" id="new-password" placeholder="New Password" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
                <input type="password" id="confirm-password" placeholder="Confirm New Password" 
                       class="bg-white/5 border border-white/10 rounded-xl p-3 text-white">
            </div>
            <button onclick="changeOwnPassword()" 
                    class="mt-4 bg-blue-500/20 border border-blue-500/30 px-6 py-2 rounded-xl text-blue-400 font-bold hover:bg-blue-500/30 transition">
                <i class="fas fa-save mr-2"></i> Update Password
            </button>
            <div id="password-status" class="text-sm mt-2"></div>
        </div>
        
        <!-- Admins List -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
            <h2 class="text-xl font-bold text-white mb-4">
                <i class="fas fa-list mr-2 text-yellow-400"></i>All Administrators
            </h2>
            <div id="admins-list" class="space-y-2">
                <div class="text-center text-slate-400 py-8">
                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading...
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/super-admin.js"></script>
    <script>
        let currentAdmin = null;
        
        function loadAdmins() {
            if (!isLoggedIn()) {
                window.location.href = 'admin-login.html';
                return;
            }
            
            currentAdmin = getCurrentAdmin();
            
            document.getElementById('admin-info').innerHTML = `
                Logged in as: <strong class="text-yellow-400">${currentAdmin.name}</strong> 
                (${currentAdmin.role === 'super_admin' ? '👑 Super Admin' : '🛡️ Admin'})
            `;
            
            if (currentAdmin.role === 'super_admin') {
                document.getElementById('add-admin-section').classList.remove('hidden');
            }
            
            const result = getAllAdmins();
            if (!result.success) {
                document.getElementById('admins-list').innerHTML = `
                    <div class="text-center text-red-400 py-8">${result.error}</div>
                `;
                return;
            }
            
            const admins = result.admins;
            
            document.getElementById('total-admins').textContent = admins.length;
            document.getElementById('super-admin-count').textContent = admins.filter(a => a.role === 'super_admin').length;
            document.getElementById('regular-admin-count').textContent = admins.filter(a => a.role === 'admin').length;
            
            if (admins.length === 0) {
                document.getElementById('admins-list').innerHTML = `
                    <div class="text-center text-slate-400 py-8">No admins found</div>
                `;
                return;
            }
            
            document.getElementById('admins-list').innerHTML = admins.map(admin => `
                <div class="admin-card bg-white/5 border border-white/10 rounded-xl p-4">
                    <div class="flex justify-between items-center flex-wrap gap-3">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">${admin.role === 'super_admin' ? '👑' : '🛡️'}</span>
                                <div>
                                    <div class="font-bold text-white">${admin.name}</div>
                                    <div class="text-sm text-slate-400">${admin.email}</div>
                                </div>
                            </div>
                            <div class="text-xs mt-2">
                                <span class="px-2 py-1 rounded-full ${admin.role === 'super_admin' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400'}">
                                    ${admin.role === 'super_admin' ? 'Super Admin' : 'Admin'}
                                </span>
                                ${admin.addedBy ? `<span class="text-slate-500 ml-2">Added by: ${admin.addedBy}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${currentAdmin.role === 'super_admin' && admin.email !== currentAdmin.email ? `
                                <select onchange="updateRole('${admin.email}', this.value)" 
                                        class="bg-white/10 border border-white/20 rounded-lg px-3 py-1 text-sm text-white">
                                    <option value="admin" ${admin.role === 'admin' ? 'selected' : ''}>Admin</option>
                                    <option value="super_admin" ${admin.role === 'super_admin' ? 'selected' : ''}>Super Admin</option>
                                </select>
                                <button onclick="removeAdmin('${admin.email}')" 
                                        class="bg-red-500/20 border border-red-500/30 px-3 py-1 rounded-lg text-red-400 text-sm hover:bg-red-500/30">
                                    <i class="fas fa-trash"></i> Remove
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function addNewAdmin() {
            const name = document.getElementById('new-admin-name').value;
            const email = document.getElementById('new-admin-email').value;
            const password = document.getElementById('new-admin-password').value;
            const role = document.getElementById('new-admin-role').value;
            const statusDiv = document.getElementById('add-status');
            
            if (!name || !email || !password) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ All fields required</span>';
                return;
            }
            
            if (password.length < 6) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ Password must be at least 6 characters</span>';
                return;
            }
            
            const result = addNewAdmin(email, password, name, role);
            
            if (result.success) {
                statusDiv.innerHTML = '<span class="text-green-400">✅ Admin added successfully!</span>';
                document.getElementById('new-admin-name').value = '';
                document.getElementById('new-admin-email').value = '';
                document.getElementById('new-admin-password').value = '';
                loadAdmins();
                setTimeout(() => statusDiv.innerHTML = '', 3000);
            } else {
                statusDiv.innerHTML = `<span class="text-red-400">❌ ${result.error}</span>`;
            }
        }
        
        function removeAdmin(email) {
            if (!confirm(`Remove admin ${email}? This action cannot be undone.`)) return;
            
            const result = removeAdmin(email);
            if (result.success) {
                loadAdmins();
            } else {
                alert(result.error);
            }
        }
        
        function updateRole(email, newRole) {
            const result = updateAdminRole(email, newRole);
            if (result.success) {
                loadAdmins();
            } else {
                alert(result.error);
            }
        }
        
        function changeOwnPassword() {
            const oldPass = document.getElementById('old-password').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const statusDiv = document.getElementById('password-status');
            
            if (!oldPass || !newPass) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ Please enter current and new password</span>';
                return;
            }
            
            if (newPass !== confirmPass) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ New passwords do not match</span>';
                return;
            }
            
            if (newPass.length < 6) {
                statusDiv.innerHTML = '<span class="text-red-400">❌ Password must be at least 6 characters</span>';
                return;
            }
            
            const result = changeOwnPassword(currentAdmin.email, oldPass, newPass);
            
            if (result.success) {
                statusDiv.innerHTML = '<span class="text-green-400">✅ Password changed successfully!</span>';
                document.getElementById('old-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
                setTimeout(() => statusDiv.innerHTML = '', 3000);
            } else {
                statusDiv.innerHTML = `<span class="text-red-400">❌ ${result.error}</span>`;
            }
        }
        
        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                logout(); // Call global logout from super-admin.js
            }
        }
        
        loadAdmins();
    </script>
</body>
</html>
