<!-- tabs/agentprofiles.html -->
<div class="p-4 max-w-5xl mx-auto min-h-screen">
    
    <!-- Top Stats / Header -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
        <div class="flex flex-col md:flex-row items-center gap-4">
            <button onclick="switchTab('adminpanel')" class="bg-white/5 border border-white/10 w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all active:scale-90" title="Back to Admin Tools">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div>
                <h2 class="header-font text-3xl font-black text-white italic uppercase tracking-tight flex items-center gap-3">
                    <span class="text-blue-400">👤</span> Agent Profiles
                </h2>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Master Management System</p>
            </div>
        </div>
        <button onclick="apOpenModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40 active:scale-95">
            <i class="fas fa-plus mr-2"></i> Add Agent
        </button>
    </div>

    <!-- Filter & Search Bar -->
    <div class="glass p-4 rounded-3xl border border-white/5 mb-8 flex flex-col md:flex-row gap-4 items-center">
        <div class="relative flex-1 w-full">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="text" id="ap-search-input" oninput="apFilterAgents()" placeholder="Search by name or User ID..." 
                   class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 pl-12 pr-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold placeholder:text-slate-600">
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <select id="ap-team-filter" onchange="apFilterAgents()" class="bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-xs font-bold focus:border-blue-500 outline-none transition-all uppercase tracking-widest appearance-none pr-10 relative">
                <option value="ALL">All Teams</option>
                <option value="BB">Berbice (BB)</option>
                <option value="PR">Providence (PR)</option>
                <option value="RM">Remote (RM)</option>
            </select>
        </div>
    </div>

    <!-- Agent List Grid -->
    <div id="ap-agent-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Agent cards will be injected here -->
        <div class="col-span-full py-20 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Accessing Master Roster...</p>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div id="ap-modal" class="hidden fixed inset-0 z-[10000] flex items-center justify-center p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="apCloseModal()"></div>
        
        <!-- Modal Content -->
        <div class="glass w-full max-w-xl relative rounded-[2rem] border border-white/10 shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 id="ap-modal-title" class="header-font text-2xl font-black text-white italic uppercase tracking-tight">Add New Agent</h3>
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Master Management System</p>
                    </div>
                    <button onclick="apCloseModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <form id="ap-form" onsubmit="apHandleSubmit(event)" class="space-y-6">
                    <input type="hidden" id="ap-form-mode" value="add">
                    <input type="hidden" id="ap-form-id" value="">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Full Name -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                            <input type="text" id="ap-name" required oninput="apAutoFillYtel()" placeholder="e.g. Kleon Williams" 
                                   class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold">
                        </div>
                        
                        <!-- User ID -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">User ID (4-Digit)</label>
                            <input type="text" id="ap-userid" required maxlength="4" placeholder="e.g. 1042" 
                                   class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold">
                        </div>

                        <!-- Team Selection -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Team</label>
                            <select id="ap-team" required onchange="apAutoFillYtel()" 
                                    class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold uppercase tracking-widest appearance-none">
                                <option value="BB">Berbice (BB)</option>
                                <option value="PR">Providence (PR)</option>
                                <option value="RM">Remote (RM)</option>
                            </select>
                        </div>

                        <!-- Ytel Name (Auto-fill) -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ytel Name</label>
                            <input type="text" id="ap-ytel-name" required placeholder="GYB/GYP Prefix..." 
                                   class="w-full bg-black/20 border border-white/10 rounded-2xl py-3 px-4 text-slate-300 text-sm focus:border-blue-500 outline-none transition-all font-bold">
                        </div>

                        <!-- Shift -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Shift</label>
                            <select id="ap-shift" required 
                                    class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold">
                                <option value="10:00AM-7:00PM">10:00 AM - 7:00 PM</option>
                                <option value="11:00AM-8:00PM">11:00 AM - 8:00 PM</option>
                                <option value="12:00PM-9:00PM">12:00 PM - 9:00 PM</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>

                        <!-- Status -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Status</label>
                            <select id="ap-status" required 
                                    class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold uppercase tracking-widest">
                                <option value="Agent">Agent</option>
                                <option value="Trainee">Trainee</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>

                        <!-- Lunch Time -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Lunch Time</label>
                            <input type="text" id="ap-lunch" placeholder="e.g. 3:00-4:00 PM" 
                                   class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold">
                        </div>

                        <!-- Break Time (Firebase Only) -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Break Time (FB Only)</label>
                            <input type="text" id="ap-break" placeholder="e.g. 15m Morning" 
                                   class="w-full bg-black/40 border border-white/10 rounded-2xl py-3 px-4 text-white text-sm focus:border-blue-500 outline-none transition-all font-bold">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-white/5 flex flex-col md:flex-row gap-4 items-center">
                        <button type="submit" id="ap-save-btn" class="w-full md:flex-1 bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-900/40 hover:scale-[1.02] active:scale-[0.98] transition-all">
                            Save Profile
                        </button>
                        <button id="ap-delete-btn" type="button" onclick="apDeleteAgent()" class="hidden w-full md:w-auto bg-red-500/10 border border-red-500/20 text-red-500 px-6 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-red-500/20 transition-all">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <div id="ap-submit-status" class="bg-black/40 p-4 text-center text-[10px] font-black uppercase tracking-widest text-slate-400 border-t border-white/5 min-h-[50px] flex items-center justify-center">
                System Status: Ready
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .agent-card {
        animation: fadeSlideIn 0.3s ease-out forwards;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(56,189,248,0.3); }
</style>
