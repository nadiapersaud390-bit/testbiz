<!-- ═══════════════════════════════════════════════════════
     SECURE CHATROOM TAB — E2E Encrypted Messaging
     ═══════════════════════════════════════════════════════ -->

<link rel="stylesheet" href="css/chatroom.css">

<style>
    /* Emoji Picker Styles */
    .cr-emoji-btn {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 20px;
        flex-shrink: 0;
    }
    .cr-emoji-btn:hover {
        background: rgba(16,185,129,0.15);
        border-color: rgba(16,185,129,0.3);
        transform: scale(1.05);
    }
    .cr-emoji-picker {
        position: absolute;
        bottom: 70px;
        left: 0;
        background: rgba(15,15,30,0.98);
        border: 1px solid rgba(16,185,129,0.3);
        border-radius: 16px;
        padding: 12px;
        backdrop-filter: blur(12px);
        z-index: 100;
        width: 280px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
        grid-template-columns: repeat(8, 1fr);
        gap: 8px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .cr-emoji-picker.show {
        display: grid;
    }
    .cr-emoji-picker::-webkit-scrollbar {
        width: 4px;
    }
    .cr-emoji-picker::-webkit-scrollbar-thumb {
        background: rgba(16,185,129,0.3);
        border-radius: 4px;
    }
    .cr-emoji-option {
        font-size: 24px;
        cursor: pointer;
        padding: 6px;
        text-align: center;
        border-radius: 10px;
        transition: all 0.15s;
    }
    .cr-emoji-option:hover {
        background: rgba(16,185,129,0.2);
        transform: scale(1.1);
    }
    .cr-emoji-picker-header {
        grid-column: span 8;
        font-size: 10px;
        font-weight: 900;
        color: #10b981;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 8px;
    }
    .cr-input-wrap {
        position: relative;
        flex: 1;
    }
    .cr-input-actions {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    @media (max-width: 600px) {
        .cr-emoji-picker {
            width: 260px;
            left: -80px;
        }
    }
</style>

<div style="max-width:1100px;margin:0 auto;padding:0 8px;">

    <!-- HEADER -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div>
            <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,3vw,20px);font-weight:900;text-transform:uppercase;letter-spacing:0.08em;background:linear-gradient(90deg,#10b981,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
                🔒 Secure Chat
            </div>
            <div style="font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;">
                End-to-End Encrypted • Private Messaging
            </div>
        </div>
        <div class="cr-e2e-badge" style="font-size:9px;">
            🔐 E2E Encrypted
        </div>
    </div>

    <!-- MAIN CHAT CONTAINER (populated by chatroom.js) -->
    <div id="cr-main-container"></div>

    <!-- CREATE ROOM MODAL -->
    <div id="cr-create-room-modal" class="cr-modal-overlay hidden">
        <div class="cr-modal-box">
            <div class="cr-modal-title">➕ Create Chat Room</div>
            <div class="cr-modal-subtitle">Create a private group chat for selected agents and admins</div>

            <label class="cr-modal-label">Room Name</label>
            <input type="text" id="cr-room-name-input" class="cr-modal-input" placeholder="e.g. Team Prov Chat" maxlength="40" autocomplete="off" />

            <label class="cr-modal-label">Select Participants (Admins + Agents)</label>
            <div id="cr-agent-checklist" class="cr-agent-checklist">
                <!-- populated by JS -->
            </div>

            <div class="cr-modal-actions">
                <button class="cr-modal-create-btn" onclick="window._crCreateRoom()">⚡ Create Room</button>
                <button class="cr-modal-cancel-btn" onclick="window._crCloseModal()">Cancel</button>
            </div>
        </div>
    </div>

</div>
