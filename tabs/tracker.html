<div class="p-4 max-w-6xl mx-auto flex flex-col gap-6">
    
    <!-- Header & Controls -->
    <div class="bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border-2 border-indigo-500/30 rounded-2xl p-5 shadow-[0_0_20px_rgba(99,102,241,0.15)] flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="text-4xl text-indigo-400"><i class="fas fa-list-check"></i></div>
            <div>
                <h2 class="text-2xl font-black bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent uppercase tracking-tight">My Lead Tracker</h2>
                <p class="text-indigo-400/80 text-[10px] font-bold uppercase tracking-widest">Track your weekly leads</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <select id="tracker-week-select" class="bg-black/40 border border-white/10 rounded-xl p-2 text-white text-[11px] font-bold uppercase tracking-widest focus:border-indigo-500 outline-none transition" onchange="window.trackerSelectWeek()">
                <option value="">Loading Weeks...</option>
            </select>
            <button id="tracker-new-week-btn" class="bg-indigo-500/20 border border-indigo-500/50 text-indigo-300 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-indigo-500/30 transition shadow-[0_0_15px_rgba(99,102,241,0.2)]" onclick="window.trackerStartNewWeek()">
                <i class="fas fa-plus mr-1"></i> Start New Week
            </button>
            <button id="tracker-del-week-btn" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 px-3 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-red-500/20 transition" onclick="window.trackerDeleteWeek()">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>

    <!-- Main Content Grid -->
    <div class="flex flex-col md:flex-row gap-6">
        
        <!-- Add Lead Form -->
        <div class="w-full md:w-1/3">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-5 sticky top-4">
                <h3 class="text-white font-black uppercase text-sm mb-4 tracking-wider flex items-center justify-between">
                    <span>Add New Lead</span>
                    <i class="fas fa-user-plus text-indigo-400"></i>
                </h3>
                
                <div class="flex flex-col gap-3">
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-1">First Name</label>
                        <input type="text" id="tl-fname" placeholder="John" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-white text-sm focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-1">Last Name</label>
                        <input type="text" id="tl-lname" placeholder="Doe" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-white text-sm focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-1">Phone Number</label>
                        <input type="tel" id="tl-phone" placeholder="(555) 555-5555" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-white text-sm focus:border-indigo-500 outline-none transition">
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="checkbox" id="tl-good" class="w-4 h-4 rounded border-white/10 bg-black/40 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-900 cursor-pointer">
                        <label for="tl-good" class="text-[11px] font-bold text-slate-300 uppercase tracking-wider cursor-pointer">Good Lead?</label>
                    </div>
                    
                    <button id="tl-submit-btn" class="mt-2 w-full bg-indigo-500/20 border border-indigo-500/50 text-indigo-300 py-3 rounded-xl text-xs font-black uppercase hover:bg-indigo-500/30 transition shadow-[0_0_15px_rgba(99,102,241,0.2)] disabled:opacity-50" onclick="window.trackerAddLead()">
                        Add Lead
                    </button>
                    <div id="tl-error" class="text-red-400 text-[10px] font-bold text-center h-4 mt-1"></div>
                </div>
            </div>
        </div>
        
        <!-- Leads Display -->
        <div class="w-full md:w-2/3">
            <div id="tracker-days-container" class="flex flex-col gap-4">
                <div class="text-center p-10 text-slate-500 font-bold uppercase tracking-widest text-xs border border-white/5 rounded-2xl bg-white/5">
                    Select or Start a week to view leads.
                </div>
            </div>
        </div>

    </div>
</div>

<style>
/* Scoped CSS */
.tl-day-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    overflow: hidden;
}
.tl-day-header {
    background: rgba(0,0,0,0.3);
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.tl-lead-row {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.2s;
}
.tl-lead-row:hover {
    background: rgba(255,255,255,0.02);
}
.tl-lead-row:last-child {
    border-bottom: none;
}
</style>
