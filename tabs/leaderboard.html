<style>
    /* ── LEADERBOARD GRID ── */
    #leaderboard {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 8px 24px;
        align-items: start;
    }
    @media (max-width: 700px) {
        #leaderboard { grid-template-columns: 1fr; }
    }

    /* ── AGENT CARD ── */
    .lb-card {
        position: relative;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);

        padding: 18px 20px 18px 20px;

        gap: 14px;
        transition: background 0.2s, transform 0.15s;
        overflow: hidden;

    }

        background: rgba(255,255,255,0.06);
        transform: translateY(-1px);

    /* Rank number — large, left side, italic, dim */

    .lb-card.tier-master    .lb-rank { color: rgba(234,179,8,0.5); }

    .lb-card.tier-master    .lb-status { color: #eab308; }
    .lb-card.tier-elite     .lb-status { color: #f97316; }
    .lb-card.tier-pro       .lb-status { color: #3b82f6; }
    .lb-card.tier-rookie    .lb-status { color: #334155; }

    /* Tier colors */
    .lb-card.tier-conqueror { background: rgba(239,68,68,0.04);  border-color: rgba(239,68,68,0.15); }
    .lb-card.tier-master    { background: rgba(234,179,8,0.04);  border-color: rgba(234,179,8,0.15); }
    .lb-card.tier-elite     { background: rgba(249,115,22,0.04); border-color: rgba(249,115,22,0.15); }
    .lb-card.tier-pro       { background: rgba(59,130,246,0.04); border-color: rgba(59,130,246,0.12); }

    /* Score block — right side */

        font-size: 42px;

    /* ── STAT CARDS ── */

        letter-spacing: 0.06em;
        text-transform: uppercase;

        background: linear-gradient(90deg, #b45309, #eab308, #fde68a);

<style>
#team-popup-overlay { display: none; }
#team-popup-overlay.visible { display: flex; }
.tp-agent-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    gap: 12px;
}
.tp-agent-rank { font-size: 13px; font-weight: 900; font-style: italic; color: #334155; min-width: 28px; }
.tp-agent-name { flex: 1; font-size: 13px; font-weight: 800; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tp-agent-leads { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; min-width: 36px; text-align: right; }
.tp-agent-label { font-size: 7px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }
</style>

<script>
// Helper function for escaping HTML
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Global function to open team popup with +X badges
window.openTeamPopup = function(teamCode) {
    const overlay  = document.getElementById('team-popup-overlay');
    const titleEl  = document.getElementById('team-popup-title');
    const labelEl  = document.getElementById('team-popup-label');
    const totalEl  = document.getElementById('team-popup-total');
    const listEl   = document.getElementById('team-popup-list');

    const teamMeta = {
        PR: { name: 'Providence', label: 'PROV TEAM BREAKDOWN', color: '#a78bfa' },
        BB: { name: 'Berbice',    label: 'BERB TEAM BREAKDOWN', color: '#c084fc' },
        RM: { name: 'Remote',     label: 'REMOTE TEAM BREAKDOWN', color: '#38bdf8' }
    };
    const meta = teamMeta[teamCode] || { name: teamCode, label: teamCode, color: '#fff' };

    const allAgents  = window._lastFullList || [];
    const teamAgents = allAgents
        .filter(a => (a.team || '').toUpperCase() === teamCode)
        .sort((a, b) => (b.leads || 0) - (a.leads || 0));

    const total = teamAgents.reduce((s, a) => s + (a.leads || 0), 0);

    titleEl.textContent = meta.name;
    titleEl.style.color = meta.color;
    labelEl.textContent = meta.label;
    totalEl.textContent = total;
    totalEl.style.color = meta.color;

    if (teamAgents.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;color:#475569;padding:24px;font-size:13px;font-weight:700;">No agents found for this team.</div>';
    } else {
        // Get the previous leads map
        const prevMap = window._prevDailyLeadsMap || {};
        
        // Debug: Log the prevMap to console to see what's stored
        console.log('[Team Popup] Previous leads map:', prevMap);
        
        listEl.innerHTML = teamAgents.map((a, i) => {
            // Generate multiple possible keys for matching
            const keys = [
                String(a.ytelId || '').trim(),
                String(a.rawName || a.name || '').trim().toUpperCase(),
                String(a.name || '').trim().toUpperCase(),
                (a.rawName || a.name || '').replace(/^(GYP|GYB|GTM|RM)\s+/i, '').trim().toUpperCase()
            ].filter(k => k !== '');
            
            // Try to find previous lead count using any of the keys
            let prev = 0;
            let matchedKey = null;
            for (const key of keys) {
                if (prevMap[key] !== undefined) {
                    prev = prevMap[key];
                    matchedKey = key;
                    break;
                }
            }
            
            const currentLeads = a.leads || 0;
            const diff = currentLeads - prev;
            
            // Debug logging for Chauncey
            if (a.name && a.name.toLowerCase().includes('chauncey')) {
                console.log(`[Chauncey Debug] Name: ${a.name}, YtelId: ${a.ytelId}, RawName: ${a.rawName}`);
                console.log(`[Chauncey Debug] Keys tried:`, keys);
                console.log(`[Chauncey Debug] Matched key: ${matchedKey}, Previous leads: ${prev}, Current: ${currentLeads}, Diff: ${diff}`);
            }
            
            // Only show +X if diff is positive AND diff is less than current (prevent showing +3 when it should be +1)
            let diffHtml = '';
            if (diff > 0 && diff <= currentLeads) {
                diffHtml = `<span style="font-size:10px;font-weight:900;color:#22c55e;background:rgba(34,197,94,0.15);padding:2px 5px;border-radius:4px;margin-right:8px;border:1px solid rgba(34,197,94,0.25);">+${diff}</span>`;
            } else if (diff > currentLeads) {
                // This catches cases where prev was 0 but should have been something else
                // Try to use the stored previous map from the last push as fallback
                const lastStateStr = localStorage.getItem('biz_last_state_obj');
                if (lastStateStr) {
                    try {
                        const lastState = JSON.parse(lastStateStr);
                        const lastAgent = (lastState.agents || []).find(agent => {
                            return String(agent.ytelId || '').trim() === String(a.ytelId || '').trim() ||
                                   (agent.name || '').toUpperCase() === (a.name || '').toUpperCase();
                        });
                        if (lastAgent && (lastAgent.dailyLeads || 0) > 0) {
                            const correctedPrev = lastAgent.dailyLeads || 0;
                            const correctedDiff = currentLeads - correctedPrev;
                            if (correctedDiff > 0 && correctedDiff <= currentLeads) {
                                diffHtml = `<span style="font-size:10px;font-weight:900;color:#22c55e;background:rgba(34,197,94,0.15);padding:2px 5px;border-radius:4px;margin-right:8px;border:1px solid rgba(34,197,94,0.25);">+${correctedDiff}</span>`;
                                console.log(`[${a.name}] Corrected diff using lastState: ${correctedDiff} (was ${diff})`);
                            }
                        }
                    } catch(e) {}
                }
            }
            
            return `
            <div class="tp-agent-row">
                <div class="tp-agent-rank">${String(i+1).padStart(2,'0')}</div>
                <div class="tp-agent-name">${escapeHtml(a.name)}</div>
                <div style="text-align:right;display:flex;align-items:center;justify-content:flex-end;">
                    ${diffHtml}
                    <div>
                        <div class="tp-agent-leads" style="color:${meta.color}">${currentLeads}</div>
                        <div class="tp-agent-label">transfers</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

// Global function to close team popup
window.closeTeamPopup = function(e) {
    if (e && e.target !== document.getElementById('team-popup-overlay')) return;
    document.getElementById('team-popup-overlay').style.display = 'none';
    document.body.style.overflow = '';
}

// Also expose to global scope for inline onclick handlers
window.openTeamPopup = openTeamPopup;
window.closeTeamPopup = closeTeamPopup;
</script>
