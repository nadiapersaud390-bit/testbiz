<style>
    /* ── LEADERBOARD GRID ── */
    #leaderboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
        gap: 16px;
        padding: 0 8px 24px;
        align-items: start;
    }
    @media (max-width: 600px) {
        #leaderboard { grid-template-columns: 1fr; }
    }

    /* ── AGENT CARD ── */
    .lb-card {
        position: relative;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 16px;
        padding: 20px 22px 20px 28px;
        display: flex;
        align-items: center;
        gap: 18px;
        transition: background 0.2s, transform 0.15s;
        overflow: hidden;
        min-height: 96px;
    }
    .lb-card:hover {
        background: rgba(255,255,255,0.06);
        transform: translateY(-1px);
    }

    /* Left accent bar */
    .lb-card::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 5px;
        border-radius: 16px 0 0 16px;
        background: var(--tier-color, #1e293b);
    }

    .lb-card.tier-conqueror { --tier-color: #ef4444; background: rgba(239,68,68,0.04); border-color: rgba(239,68,68,0.15); }
    .lb-card.tier-master    { --tier-color: #eab308; background: rgba(234,179,8,0.04);  border-color: rgba(234,179,8,0.15); }
    .lb-card.tier-elite     { --tier-color: #f97316; background: rgba(249,115,22,0.04); border-color: rgba(249,115,22,0.15); }
    .lb-card.tier-pro       { --tier-color: #3b82f6; background: rgba(59,130,246,0.04); border-color: rgba(59,130,246,0.12); }
    .lb-card.tier-rookie    { --tier-color: #1e293b; }

    /* Rank */
    .lb-rank {
        font-size: 18px;
        font-weight: 900;
        font-style: italic;
        color: #334155;
        min-width: 32px;
        flex-shrink: 0;
        text-align: center;
    }
    .lb-card.tier-conqueror .lb-rank { color: rgba(239,68,68,0.5); }
    .lb-card.tier-master .lb-rank    { color: rgba(234,179,8,0.5); }
    .lb-card.tier-elite .lb-rank     { color: rgba(249,115,22,0.5); }

    /* Divider */
    .lb-divider {
        width: 1px;
        height: 44px;
        background: rgba(255,255,255,0.08);
        flex-shrink: 0;
    }

    /* Info */
    .lb-info {
        flex: 1;
        min-width: 0;
    }
    .lb-name-row {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-wrap: nowrap;
        overflow: hidden;
    }
    .lb-name {
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
        color: #f1f5f9;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
    }
    .lb-team-badge {
        font-size: 8px;
        font-weight: 900;
        padding: 3px 7px;
        border-radius: 4px;
        flex-shrink: 0;
        white-space: nowrap;
    }
    .lb-you-badge {
        font-size: 8px;
        font-weight: 900;
        background: rgba(250,204,21,0.12);
        border: 1px solid rgba(250,204,21,0.3);
        color: #facc15;
        padding: 3px 7px;
        border-radius: 4px;
        flex-shrink: 0;
    }
    .lb-status {
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 7px;
    }
    .lb-card.tier-conqueror .lb-status { color: #ef4444; }
    .lb-card.tier-master    .lb-status { color: #eab308; }
    .lb-card.tier-elite     .lb-status { color: #f97316; }
    .lb-card.tier-pro       .lb-status { color: #3b82f6; }
    .lb-card.tier-rookie    .lb-status { color: #475569; }

    /* Score */
    .lb-score {
        text-align: right;
        flex-shrink: 0;
    }
    .lb-score-num {
        font-size: 46px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.02em;
    }
    .lb-score-label {
        font-size: 8px;
        font-weight: 900;
        text-transform: uppercase;
        color: #475569;
        letter-spacing: 0.08em;
        margin-top: 4px;
    }

    /* YOU highlight */
    .lb-card.is-me {
        outline: 2px solid rgba(250,204,21,0.45);
        outline-offset: -2px;
    }
</style>

<style>

.tp-agent-row {
    display: flex;

}
.tp-agent-leads {
    font-size: 22px;

<script>
function openTeamPopup(teamCode) {
    const overlay = document.getElementById('team-popup-overlay');
    const titleEl = document.getElementById('team-popup-title');
    const labelEl = document.getElementById('team-popup-label');
    const totalEl = document.getElementById('team-popup-total');
    const listEl  = document.getElementById('team-popup-list');

    const teamMeta = {
        PR: { name: 'Providence',  label: 'PROV TEAM BREAKDOWN', color: '#a78bfa' },
        BB: { name: 'Berbice',     label: 'BERB TEAM BREAKDOWN', color: '#c084fc' },
        RM: { name: 'Remote',      label: 'REMOTE TEAM BREAKDOWN', color: '#38bdf8' }
    };
    const meta = teamMeta[teamCode] || { name: teamCode, label: teamCode, color: '#fff' };

    // Pull data from the global fullList that dashboard.js builds
    // We expose it via window._lastFullList set in dashboard.js render()
    const allAgents = window._lastFullList || [];
    const teamAgents = allAgents
        .filter(a => (a.team || '').toUpperCase() === teamCode)
        .sort((a, b) => (b.leads || 0) - (a.leads || 0));

    const total = teamAgents.reduce((s, a) => s + (a.leads || 0), 0);

    titleEl.textContent = meta.name;
    titleEl.style.color = meta.color;
    labelEl.textContent = meta.label;
    totalEl.textContent = total;
    totalEl.style.color = meta.color;

    if (teamAgents.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;color:#475569;padding:24px;font-size:13px;font-weight:700;">No agents found for this team.</div>';
    } else {
        listEl.innerHTML = teamAgents.map((a, i) => {
            const idLookup = String(a.ytelId || a.rawName || a.name || '').trim();
            const prev = (window._prevDailyLeadsMap && window._prevDailyLeadsMap[idLookup]) || 0;
            const diff = (a.leads || 0) - prev;
            const diffHtml = (diff > 0) ? `<span style="font-size:10px;font-weight:900;color:#22c55e;background:rgba(34,197,94,0.15);padding:2px 5px;border-radius:4px;margin-right:8px;border:1px solid rgba(34,197,94,0.25);">+${diff}</span>` : '';
            return `
            <div class="tp-agent-row">
                <div class="tp-agent-rank">${String(i+1).padStart(2,'0')}</div>
                <div class="tp-agent-name">${escapeHtml ? escapeHtml(a.name) : a.name}</div>
                <div style="text-align:right; display:flex; align-items:center; justify-content:flex-end;">
                    ${diffHtml}
                    <div>
                        <div class="tp-agent-leads" style="color:${meta.color}">${a.leads || 0}</div>
                        <div class="tp-agent-label">transfers</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // Use direct style to override inline display:none
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeTeamPopup(e) {
    if (e && e.target !== document.getElementById('team-popup-overlay')) return;
    document.getElementById('team-popup-overlay').style.display = 'none';
    document.body.style.overflow = '';
}

window.openTeamPopup = openTeamPopup;
window.closeTeamPopup = closeTeamPopup;
</script>
