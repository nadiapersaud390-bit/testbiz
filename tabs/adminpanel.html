<div class="p-4 max-w-4xl mx-auto">
    <!-- Regular Admin Header -->
    <div class="text-center mb-6">
        <div class="bg-gradient-to-r from-blue-500/20 to-cyan-500/20 border-2 border-blue-500/50 rounded-2xl p-4 mb-4">
            <div class="flex items-center justify-center gap-3 mb-2">
                <span class="text-4xl">🛡️</span>
                <span class="text-2xl font-black bg-gradient-to-r from-blue-400 to-cyan-500 bg-clip-text text-transparent uppercase">Admin Tools</span>
                <span class="text-4xl">🛡️</span>
            </div>
            <p class="text-blue-400 text-sm font-bold uppercase tracking-wider">Manage Leads & System Operations</p>
        </div>
    </div>

    <!-- Quick Tools Section -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <!-- Lead Management Placeholder -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/10 transition cursor-pointer flex items-center justify-between group">
            <div>
                <h3 class="text-lg font-bold text-white group-hover:text-cyan-400 transition flex items-center gap-2">
                    <i class="fas fa-file-upload text-cyan-500"></i> Upload Leads
                </h3>
                <p class="text-xs text-slate-400 mt-1">Upload daily lead lists or custom CSVs.</p>
            </div>
            <i class="fas fa-arrow-right text-slate-500 group-hover:text-cyan-400"></i>
        </div>

        <!-- Call Recordings Placeholder -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/10 transition cursor-pointer flex items-center justify-between group">
            <div>
                <h3 class="text-lg font-bold text-white group-hover:text-purple-400 transition flex items-center gap-2">
                    <i class="fas fa-headphones text-purple-500"></i> Call Recordings
                </h3>
                <p class="text-xs text-slate-400 mt-1">Review QA and 120s qualification recordings.</p>
            </div>
            <i class="fas fa-arrow-right text-slate-500 group-hover:text-purple-400"></i>
        </div>
    </div>

    <!-- System Broadcasts -->
    <div class="bg-white/5 border border-white/10 rounded-2xl p-5">
        <h3 class="text-lg font-bold text-purple-400 mb-4 flex items-center gap-2">
            <i class="fas fa-broadcast-tower"></i> 
            Global Broadcast Message
        </h3>
        <p class="text-xs text-slate-400 mb-3">Send a real-time notification to all connected agents. Use sparingly.</p>
        <textarea id="regular-broadcast-message" rows="3" placeholder="Type an urgent message to all agents..." 
                  class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white text-sm focus:border-purple-500 transition"></textarea>
        <button onclick="sendRegularBroadcast()" 
                class="mt-4 bg-purple-500/20 border border-purple-500/30 px-6 py-2 rounded-xl text-purple-400 text-sm font-black hover:bg-purple-500/30 transition uppercase tracking-wider">
            <i class="fas fa-paper-plane mr-2"></i> Send Broadcast
        </button>
        <div id="regular-broadcast-status" class="text-xs mt-2"></div>
    </div>
</div>

<script>
    function sendRegularBroadcast() {
        const message = document.getElementById('regular-broadcast-message').value;
        const statusDiv = document.getElementById('regular-broadcast-status');
        
        if (!message.trim()) {
            statusDiv.innerHTML = '<span class="text-red-400 font-bold">❌ Please enter a message</span>';
            return;
        }
        
        const cAdmin = JSON.parse(sessionStorage.getItem('currentAdmin') || '{}');
        const adminName = cAdmin.name || cAdmin.email || 'Admin';
        
        if (typeof window.sendBroadcastMessage === 'function') {
            // Push to Firebase RTDB
            window.sendBroadcastMessage(message, adminName);
        } else {
            // Fallback
            const broadcast = {
                message: message,
                timestamp: new Date().toISOString(),
                sentBy: adminName
            };
            localStorage.setItem('biz_broadcast', JSON.stringify(broadcast));
        }
        
        // Log Activity
        if (typeof window.writeAdminActivityLog === 'function') {
            window.writeAdminActivityLog('broadcast', 'Sent broadcast message: ' + message.substring(0, 30) + '...');
        }
        
        statusDiv.innerHTML = '<span class="text-green-400 font-bold">✅ Broadcast sent to all agents!</span>';
        document.getElementById('regular-broadcast-message').value = '';
        
        setTimeout(() => statusDiv.innerHTML = '', 3000);
    }
</script>
