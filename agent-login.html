<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIZ Agent Clock In</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #020617;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      padding: 20px;
      animation: fadeIn 0.55s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    .shake { animation: shake 0.45s ease; }

    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 rgba(250,204,21,0); }
      50%      { box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 40px rgba(250,204,21,0.13); }
    }

    .card {
      width: 100%;
      max-width: 440px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.03);
      padding: 32px 26px 28px;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    /* ── Header ── */
    h1 {
      font-family: 'Orbitron', sans-serif;
      margin: 0 0 4px;
      font-size: clamp(20px, 5vw, 26px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, #facc15, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .sub {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 20px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Clock bar ── */
    .clock-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 10px 18px;
      margin-bottom: 22px;
    }

    #clock-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #facc15;
      letter-spacing: 0.04em;
    }

    #late-badge {
      display: none;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 9px;
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Form fields ── */
    label {
      display: block;
      margin-bottom: 6px;
      color: #94a3b8;
      font-size: 11px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 13px 15px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 14px;
      transition: border-color 0.2s, outline 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: 2px solid rgba(250,204,21,0.4);
      border-color: rgba(250,204,21,0.6);
    }

    /* ── Admin password reveal ── */
    #admin-password-wrap {
      display: none;
    }

    /* ── Error ── */
    .err {
      min-height: 18px;
      color: #ef4444;
      font-size: 12px;
      margin: -6px 0 12px;
      text-align: center;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Submit button ── */
    #submit-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      color: #020617;
      background: linear-gradient(90deg, #ca8a04, #facc15, #fb923c);
      transition: opacity 0.2s, transform 0.15s;
    }

    #submit-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #submit-btn:not(:disabled):hover { transform: scale(1.02); }
    #submit-btn:not(:disabled):active { transform: scale(0.98); }

    /* ── Admin link ── */
    .admin-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: #475569;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.05em;
    }

    .admin-link:hover { color: #94a3b8; }

    /* ══════════════════════════════════
       RESULT PANEL
    ══════════════════════════════════ */
    #result-panel { display: none; }

    .result-header {
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .result-header.is-present { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); }
    .result-header.is-late    { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3); }

    #result-emoji { font-size: 32px; flex-shrink: 0; }

    #result-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }

    .result-tag {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 3px 10px;
      border-radius: 999px;
      display: inline-block;
      margin-top: 4px;
      font-family: 'Poppins', sans-serif;
    }

    .result-tag.present { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .result-tag.late    { background: rgba(239,68,68,0.2);  color: #f87171; }

    #result-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .info-cell {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .info-cell.full { grid-column: 1 / -1; }

    .info-label {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #475569;
      margin-bottom: 4px;
      font-family: 'Poppins', sans-serif;
    }

    .info-value {
      font-size: 15px;
      font-weight: 800;
      color: #f8fafc;
      font-family: 'Poppins', sans-serif;
    }

    .info-value.ok   { color: #4ade80; }
    .info-value.warn { color: #f87171; }
    .info-value.leads { color: #facc15; font-size: 20px; font-family: 'Orbitron', sans-serif; }

    #stamp {
      text-align: center;
      font-size: 11px;
      color: #475569;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 14px;
    }

    #redirect-note {
      display: none;
      text-align: center;
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    #reset-btn {
      display: block;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: transparent;
      color: #94a3b8;
      padding: 11px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    #reset-btn:hover { background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>

<div class="card">

  <!-- ── Clock bar ── -->
  <div class="clock-bar">
    <span id="clock-display">--:--:-- --</span>
    <span id="late-badge">Late</span>
  </div>

  <h1>BIZ Level Up</h1>
  <p class="sub">Enter your Ytel ID to clock in and access the dashboard.</p>

  <!-- ══════════════════════════
       LOGIN FORM
  ══════════════════════════ -->
  <div id="login-form">
    <label for="ytel-input">Ytel ID</label>
    <input
      id="ytel-input"
      type="text"
      inputmode="numeric"
      autocomplete="off"
      placeholder="e.g. 1234"
      onkeydown="if(event.key==='Enter')doSubmit()"
    />

    <div id="admin-password-wrap">
      <label for="admin-password-input">Admin Password</label>
      <input
        id="admin-password-input"
        type="password"
        autocomplete="off"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doSubmit()"
      />
    </div>

    <div class="err" id="err-msg"></div>

    <button id="submit-btn" type="button" data-mode="" onclick="doSubmit()">
      Clock In →
    </button>

    <a class="admin-link" href="admin-login.html">Admin Login →</a>
  </div>

  <!-- ══════════════════════════
       RESULT PANEL
  ══════════════════════════ -->
  <div id="result-panel">
    <div id="result-header" class="result-header is-present">
      <span id="result-emoji">✅</span>
      <div>
        <div id="result-name">Agent</div>
        <span id="result-tag" class="result-tag present">Marked Present</span>
      </div>
    </div>

    <div id="result-info"></div>
    <div id="stamp"></div>

    <div id="redirect-note">⏳ Redirecting to dashboard...</div>

    <button id="reset-btn" type="button" onclick="doReset()">← Try a different ID</button>
  </div>

</div><!-- /.card -->

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzAKQCxoAhX260aUZCjlH7P-DjfQKlSuUJ9V7QO0g71z6SDk5d5oEXyaTh4GoSWzEeXgQ/exec';
  const SHIFT_HOUR    = 10;
  const SHIFT_MINUTE  = 0;
  const GRACE_MINUTES = 15;

  /* ── Time helpers ── */
  function guyanaTime() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Guyana' }));
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function fmtTime(d) {
    const h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
    return pad(h % 12 || 12) + ':' + pad(m) + ':' + pad(s) + ' ' + (h >= 12 ? 'PM' : 'AM');
  }
  function formatGuyanaDateISO(d) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Guyana',
      year: 'numeric', month: '2-digit', day: '2-digit'
    }).formatToParts(d).reduce((acc, part) => {
      if (part.type !== 'literal') acc[part.type] = part.value;
      return acc;
    }, {});
    return `${parts.year}-${parts.month}-${parts.day}`;
  }
  function getGuyanaWeekday(d) {
    return new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/Guyana', weekday: 'short'
    }).format(d);
  }
  function isWorkday(weekday) {
    return ['Mon','Tue','Wed','Thu','Fri'].includes(weekday);
  }
  function toUTCDate(dateStr) { return new Date(`${dateStr}T00:00:00Z`); }
  function nextWorkday(dateStr) {
    const d = toUTCDate(dateStr);
    d.setUTCDate(d.getUTCDate() + 1);
    while ([0,6].includes(d.getUTCDay())) d.setUTCDate(d.getUTCDate() + 1);
    return d.toISOString().slice(0, 10);
  }
  function checkLate() {
    const g   = guyanaTime();
    const now = g.getHours() * 60 + g.getMinutes();
    const gate = SHIFT_HOUR * 60 + SHIFT_MINUTE + GRACE_MINUTES;
    return now > gate;
  }

  /* ── Clock tick ── */
  function tickClock() {
    document.getElementById('clock-display').textContent = fmtTime(guyanaTime());
    document.getElementById('late-badge').style.display  = checkLate() ? 'inline-block' : 'none';
  }
  tickClock();
  setInterval(tickClock, 1000);

  /* ── Attendance cache (localStorage) ── */
  function getAttendanceCache() {
    try { return JSON.parse(localStorage.getItem('biz_attendance_marks_v1') || '{}'); }
    catch { return {}; }
  }
  function getTodayAttendance(ytelId) {
    const todayISO = formatGuyanaDateISO(guyanaTime());
    const row = getAttendanceCache()[ytelId];
    return (row && row.date === todayISO) ? row : null;
  }
  function setTodayAttendance(ytelId, status) {
    const todayISO = formatGuyanaDateISO(guyanaTime());
    const cache = getAttendanceCache();
    cache[ytelId] = { date: todayISO, status: status || 'Present' };
    localStorage.setItem('biz_attendance_marks_v1', JSON.stringify(cache));
  }

  /* ── Streak tracking ── */
  function updateAgentStreak(profile) {
    const today    = guyanaTime();
    const todayISO = formatGuyanaDateISO(today);
    const weekday  = getGuyanaWeekday(today);
    const allStreaks = JSON.parse(localStorage.getItem('biz_agent_streaks_v1') || '{}');
    const current  = allStreaks[profile.ytelId] || { streak: 0, lastLoginDate: '' };

    if (isWorkday(weekday)) {
      if (current.lastLoginDate !== todayISO) {
        const shouldIncrement = current.lastLoginDate && nextWorkday(current.lastLoginDate) === todayISO;
        current.streak       = shouldIncrement ? (current.streak || 0) + 1 : 1;
        current.lastLoginDate = todayISO;
      }
    } else if (!current.streak) {
      current.streak = 1;
    }

    allStreaks[profile.ytelId] = current;
    localStorage.setItem('biz_agent_streaks_v1', JSON.stringify(allStreaks));
    return current.streak || 1;
  }

  /* ── Lunch slot normaliser ── */
  function normalizeLunchSlot(lunchRaw) {
    const lunch = String(lunchRaw || '').trim();
    if (!lunch || lunch === '—') return '—';
    const normalized = lunch.replace(/\s+/g,' ').replace(/\s*-\s*/g,'-').toLowerCase();
    const m = normalized.match(/^(\d{1,2})-(\d{1,2})\s*([ap])\.?m\.?$/i);
    if (!m) return lunch;
    const start = Number(m[1]), end = Number(m[2]), mer = m[3].toLowerCase();
    if (mer === 'p' && start === 4 && end === 5) return '3-4 p.m';
    return `${start}-${end} ${mer}.m`;
  }

  /* ── Error flash ── */
  function flashError(input, msg) {
    const errEl = document.getElementById('err-msg');
    const btn   = document.getElementById('submit-btn');
    input.classList.add('shake');
    errEl.textContent = msg;
    btn.disabled      = false;
    btn.textContent   = btn.dataset.mode === 'admin' ? 'Admin Log In →' : 'Clock In →';
    setTimeout(() => input.classList.remove('shake'), 500);
  }

  /* ── Main submit ── */
  async function doSubmit() {
    const input              = document.getElementById('ytel-input');
    const adminPasswordInput = document.getElementById('admin-password-input');
    const adminPasswordWrap  = document.getElementById('admin-password-wrap');
    const errEl              = document.getElementById('err-msg');
    const btn                = document.getElementById('submit-btn');
    const ytelId             = input.value.trim();
    const inAdminMode        = btn.dataset.mode === 'admin';

    if (inAdminMode) { doAdminLogin(adminPasswordInput); return; }

    if (!ytelId) { flashError(input, 'Please enter your Ytel ID.'); return; }

    /* Admin shortcut: Ytel ID 0000 */
    if (ytelId === '0000') {
      errEl.textContent = '';
      adminPasswordWrap.style.display = 'block';
      btn.dataset.mode  = 'admin';
      btn.textContent   = 'Admin Log In →';
      adminPasswordInput.focus();
      return;
    }

    errEl.textContent = '';
    btn.disabled      = true;
    btn.textContent   = '⏳ Clocking In...';

    const status = checkLate() ? 'Late' : 'Present';

    try {
      const sRes  = await fetch(`${API_URL}?action=getAgentSchedule&ytelId=${encodeURIComponent(ytelId)}`);
      const sData = await sRes.json();

      if (!sData.found) {
        flashError(input, 'Ytel ID not found — double-check your number.');
        return;
      }

      const existingMark    = getTodayAttendance(ytelId);
      const attendanceStatus = existingMark ? existingMark.status : status;

      if (!existingMark) {
        const aRes  = await fetch(`${API_URL}?action=autoAttendance&ytelId=${encodeURIComponent(ytelId)}&name=${encodeURIComponent(sData.name)}&status=${encodeURIComponent(attendanceStatus)}`);
        const aData = await aRes.json();
        if (!aData.ok) {
          flashError(input, 'Attendance marking failed — please try again.');
          return;
        }
        setTodayAttendance(ytelId, attendanceStatus);
      }

      showResult(sData, attendanceStatus, ytelId);

    } catch (e) {
      flashError(input, 'Network error — check your connection and retry.');
    }
  }

  /* ── Admin login (via hidden password field) ── */
  function doAdminLogin(adminPasswordInput) {
    if (adminPasswordInput.value !== 'admin') {
      flashError(adminPasswordInput, 'Incorrect admin password.');
      return;
    }
    sessionStorage.setItem('agentLoggedIn',    '1');
    sessionStorage.setItem('bizAdminUnlocked', '1');
    sessionStorage.setItem('bizUserRole',      'admin');
    sessionStorage.removeItem('currentAgentName');
    sessionStorage.removeItem('currentAgentProfile');
    window.location.href = 'index.html';
  }

  /* ── Show result panel ── */
  function showResult(data, status, ytelId) {
    const late      = status === 'Late';
    const now       = guyanaTime();
    const clockedAt = fmtTime(now);
    const dateStr   = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    const lunchSlot = normalizeLunchSlot(data.lunch);

    const header = document.getElementById('result-header');
    header.className = 'result-header ' + (late ? 'is-late' : 'is-present');
    document.getElementById('result-emoji').textContent = late ? '⏰' : '✅';
    document.getElementById('result-name').textContent  = data.name || 'Agent';
    const tag = document.getElementById('result-tag');
    tag.textContent = late ? 'Marked Late' : 'Marked Present';
    tag.className   = 'result-tag ' + (late ? 'late' : 'present');

    const cells = [
      { label: 'Team',       value: data.team  || '—',  cls: '' },
      { label: 'Shift',      value: data.shift || '—',  cls: late ? 'warn' : 'ok' },
      { label: 'Lunch Slot', value: lunchSlot,          cls: '' },
      { label: 'Clocked In', value: clockedAt,          cls: late ? 'warn' : 'ok' },
    ];
    if (data.weekLead != null) {
      cells.push({ label: '⚡ Weekly Leads', value: data.weekLead, cls: 'leads', full: true });
    }

    document.getElementById('result-info').innerHTML = cells.map(c =>
      `<div class="info-cell${c.full ? ' full' : ''}">
         <div class="info-label">${c.label}</div>
         <div class="info-value ${c.cls}">${c.value}</div>
       </div>`
    ).join('');

    document.getElementById('stamp').textContent = dateStr + ' · ' + clockedAt + ' Guyana Time';
    document.getElementById('login-form').style.display    = 'none';
    document.getElementById('result-panel').style.display  = 'block';
    document.getElementById('redirect-note').style.display = 'block';

    /* Session storage */
    sessionStorage.setItem('agentLoggedIn',    '1');
    sessionStorage.setItem('bizUserRole',      'agent');
    sessionStorage.setItem('currentAgentName', data.name || '');
    const profile = {
      name:   data.name || 'Agent',
      ytelId: ytelId    || '',
      lunch:  lunchSlot,
      shift:  data.shift || '—'
    };
    profile.streak = updateAgentStreak(profile);
    sessionStorage.setItem('currentAgentProfile', JSON.stringify(profile));

    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
  }

  /* ── Reset back to login form ── */
  function doReset() {
    const btn = document.getElementById('submit-btn');
    document.getElementById('login-form').style.display    = 'block';
    document.getElementById('result-panel').style.display  = 'none';
    document.getElementById('redirect-note').style.display = 'none';
    document.getElementById('ytel-input').value            = '';
    document.getElementById('admin-password-input').value  = '';
    document.getElementById('admin-password-wrap').style.display = 'none';
    document.getElementById('err-msg').textContent         = '';
    btn.disabled     = false;
    btn.dataset.mode = '';
    btn.textContent  = 'Clock In →';
    document.getElementById('ytel-input').focus();
  }

  /* ── Auto-focus on load ── */
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ytel-input').focus();
  });
</script>
</body>
</html>
