<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzAKQCxoAhX260aUZCjlH7P-DjfQKlSuUJ9V7QO0g71z6SDk5d5oEXyaTh4GoSWzEeXgQ/exec';
  const SHIFT_HOUR = 10;
  const SHIFT_MINUTE = 0;
  const GRACE_MINUTES = 15;

  function guyanaTime() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Guyana' }));
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function formatGuyanaDateISO(d) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Guyana',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(d).reduce((acc, part) => {
      if (part.type !== 'literal') acc[part.type] = part.value;
      return acc;
    }, {});
    return `${parts.year}-${parts.month}-${parts.day}`;
  }
  function getGuyanaWeekday(d) {
    return new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/Guyana',
      weekday: 'short'
    }).format(d);
  }
  function isWorkday(weekday) {
    return ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].includes(weekday);
  }
  function toUTCDate(dateStr) {
    return new Date(`${dateStr}T00:00:00Z`);
  }
  function nextWorkday(dateStr) {
    const d = toUTCDate(dateStr);
    d.setUTCDate(d.getUTCDate() + 1);
    while ([0, 6].includes(d.getUTCDay())) d.setUTCDate(d.getUTCDate() + 1);
    return d.toISOString().slice(0, 10);
  }
  function updateAgentStreak(profile) {
    const today = guyanaTime();
    const todayISO = formatGuyanaDateISO(today);
    const weekday = getGuyanaWeekday(today);
    const allStreaks = JSON.parse(localStorage.getItem('biz_agent_streaks_v1') || '{}');
    const current = allStreaks[profile.ytelId] || { streak: 0, lastLoginDate: '' };

    if (isWorkday(weekday)) {
      if (current.lastLoginDate !== todayISO) {
        const shouldIncrement = current.lastLoginDate && nextWorkday(current.lastLoginDate) === todayISO;
        current.streak = shouldIncrement ? (current.streak || 0) + 1 : 1;
        current.lastLoginDate = todayISO;
      }
    } else if (!current.streak) {
      current.streak = 1;
    }

    allStreaks[profile.ytelId] = current;
    localStorage.setItem('biz_agent_streaks_v1', JSON.stringify(allStreaks));
    return current.streak || 1;
  }
  function fmtTime(d) {
    const h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
    return pad(h % 12 || 12) + ':' + pad(m) + ':' + pad(s) + ' ' + (h >= 12 ? 'PM' : 'AM');
  }
  function checkLate() {
    const g = guyanaTime();
    const now = g.getHours() * 60 + g.getMinutes();
    const gate = SHIFT_HOUR * 60 + SHIFT_MINUTE + GRACE_MINUTES;
    return now > gate;
  }

  function getAttendanceCache() {
    try {
      return JSON.parse(localStorage.getItem('biz_attendance_marks_v1') || '{}');
    } catch (e) {
      return {};
    }
  }

  function getTodayAttendance(ytelId) {
    const todayISO = formatGuyanaDateISO(guyanaTime());
    const cache = getAttendanceCache();
    const row = cache[ytelId];
    if (!row || row.date !== todayISO) return null;
    return row;
  }

  function setTodayAttendance(ytelId, status) {
    const todayISO = formatGuyanaDateISO(guyanaTime());
    const cache = getAttendanceCache();
    cache[ytelId] = { date: todayISO, status: status || 'Present' };
    localStorage.setItem('biz_attendance_marks_v1', JSON.stringify(cache));
  }

  function normalizeLunchSlot(lunchRaw, shiftRaw) {
    const lunch = String(lunchRaw || '').trim();
    if (!lunch || lunch === '—') return '—';

    const normalized = lunch.replace(/\s+/g, ' ').replace(/\s*-\s*/g, '-').toLowerCase();
    const m = normalized.match(/^(\d{1,2})-(\d{1,2})\s*([ap])\.?m\.?$/i);
    if (!m) return lunch;

    let start = Number(m[1]);
    let end = Number(m[2]);
    const meridiem = m[3].toLowerCase();
    const shift = String(shiftRaw || '').toLowerCase();

    // Some schedule rows are shifted +4h (UTC formatting leak), e.g. "4-5 p.m" instead of "12-1 p.m".
    if (meridiem === 'p' && /10\s*am\s*-\s*7\s*pm|11\s*am\s*-\s*8\s*pm|9\s*am\s*-\s*6\s*pm/.test(shift) && start >= 4 && start <= 8) {
      start -= 4;
      end -= 4;
      if (start <= 0) start += 12;
      if (end <= 0) end += 12;
      return `${start}-${end} p.m`;
    }

    return `${start}-${end} ${meridiem}.m`;
  }

  function tickClock() {
    document.getElementById('clock-display').textContent = fmtTime(guyanaTime());
    document.getElementById('late-badge').style.display = checkLate() ? 'inline-block' : 'none';
  }
  tickClock();
  setInterval(tickClock, 1000);

  async function doSubmit() {
    const input = document.getElementById('ytel-input');
    const adminPasswordInput = document.getElementById('admin-password-input');
    const adminPasswordWrap = document.getElementById('admin-password-wrap');
    const errEl = document.getElementById('err-msg');
    const btn = document.getElementById('submit-btn');
    const ytelId = input.value.trim();
    const inAdminMode = btn.dataset.mode === 'admin';

    if (inAdminMode) {
      doAdminLogin(adminPasswordInput, errEl, btn);
      return;
    }

    if (!ytelId) {
      flashError(input, errEl, btn, 'Please enter your Ytel ID.');
      return;
    }

    if (ytelId === '0000') {
      errEl.textContent = '';
      adminPasswordWrap.style.display = 'block';
      btn.dataset.mode = 'admin';
      btn.textContent = 'Admin Log In →';
      adminPasswordInput.focus();
      return;
    }

    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = '⏳ Clocking In...';

    const status = checkLate() ? 'Late' : 'Present';

    try {
      const sRes = await fetch(`${API_URL}?action=getAgentSchedule&ytelId=${encodeURIComponent(ytelId)}`);
      const sData = await sRes.json();

      if (!sData.found) {
        flashError(input, errEl, btn, 'Ytel ID not found — double-check your number.');
        return;
      }

      const existingMark = getTodayAttendance(ytelId);
      const attendanceStatus = existingMark ? existingMark.status : status;

      if (!existingMark) {
        const aRes = await fetch(`${API_URL}?action=autoAttendance&ytelId=${encodeURIComponent(ytelId)}&name=${encodeURIComponent(sData.name)}&status=${encodeURIComponent(attendanceStatus)}`);
        const aData = await aRes.json();

        if (!aData.ok) {
          flashError(input, errEl, btn, 'Attendance marking failed — please try again.');
          return;
        }
        setTodayAttendance(ytelId, attendanceStatus);
      }

      showResult(sData, attendanceStatus, ytelId);
    } catch (e) {
      flashError(input, errEl, btn, 'Network error — check your connection and retry.');
    }
  }

  function doAdminLogin(adminPasswordInput, errEl, btn) {
    if (adminPasswordInput.value !== 'admin') {
      flashError(adminPasswordInput, errEl, btn, 'Incorrect admin password.');
      return;
    }

    sessionStorage.setItem('agentLoggedIn', '1');
    sessionStorage.setItem('bizAdminUnlocked', '1');
    sessionStorage.setItem('bizUserRole', 'admin');
    sessionStorage.removeItem('currentAgentName');
    sessionStorage.removeItem('currentAgentProfile');
    window.location.href = 'index.html';
  }

  function flashError(input, errEl, btn, msg) {
    input.classList.add('shake');
    errEl.textContent = msg;
    btn.disabled = false;
    btn.textContent = btn.dataset.mode === 'admin' ? 'Admin Log In →' : 'Clock In →';
    setTimeout(() => input.classList.remove('shake'), 500);
  }

  function showResult(data, status, ytelId) {
    const late = status === 'Late';
    const now = guyanaTime();
    const clockedAt = fmtTime(now);
    const dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    const lunchSlot = normalizeLunchSlot(data.lunch, data.shift);

    const header = document.getElementById('result-header');
    header.className = 'result-header ' + (late ? 'is-late' : 'is-present');
    document.getElementById('result-emoji').textContent = late ? '⏰' : '✅';
    document.getElementById('result-name').textContent = data.name || 'Agent';
    const tag = document.getElementById('result-tag');
    tag.textContent = late ? 'Marked Late' : 'Marked Present';
    tag.className = 'result-tag ' + (late ? 'late' : 'present');

    const cells = [
      { label: 'Team', value: data.team || '—', cls: '' },
      { label: 'Shift', value: data.shift || '—', cls: late ? 'warn' : 'ok' },
      { label: 'Lunch Slot', value: lunchSlot, cls: '' },
      { label: 'Clocked In', value: clockedAt, cls: late ? 'warn' : 'ok' },
    ];
    if (data.weekLead !== null && data.weekLead !== undefined) {
      cells.push({ label: '⚡ Weekly Leads', value: data.weekLead, cls: 'leads', full: true });
    }

    document.getElementById('result-info').innerHTML = cells.map(c =>
      `<div class="info-cell${c.full ? ' full' : ''}"><div class="info-label">${c.label}</div><div class="info-value ${c.cls}">${c.value}</div></div>`
    ).join('');

    document.getElementById('stamp').textContent = dateStr + ' · ' + clockedAt + ' Guyana Time';

    document.getElementById('login-form').style.display = 'none';
    document.getElementById('result-panel').style.display = 'block';
    document.getElementById('redirect-note').style.display = 'block';

    sessionStorage.setItem('agentLoggedIn', '1');
    sessionStorage.setItem('bizUserRole', 'agent');
    sessionStorage.setItem('currentAgentName', data.name || '');
    const profile = {
      name: data.name || 'Agent',
      ytelId: ytelId || '',
      lunch: lunchSlot,
      shift: data.shift || '—'
    };
    profile.streak = updateAgentStreak(profile);
    sessionStorage.setItem('currentAgentProfile', JSON.stringify(profile));
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1200);
  }

  function doReset() {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('redirect-note').style.display = 'none';
    document.getElementById('ytel-input').value = '';
    document.getElementById('admin-password-input').value = '';
    document.getElementById('admin-password-wrap').style.display = 'none';
    document.getElementById('err-msg').textContent = '';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').dataset.mode = '';
    document.getElementById('submit-btn').textContent = 'Clock In →';
    document.getElementById('ytel-input').focus();
  }

  window.addEventListener('DOMContentLoaded', () => document.getElementById('ytel-input').focus());
</script>
