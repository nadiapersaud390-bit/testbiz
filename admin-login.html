<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Business Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        
        .user-hint {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .user-hint h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .user-hint p {
            margin: 5px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏢 Admin Login</h1>
            <p>Business Management System</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="user-hint">
            <h4>📋 Authorized Users:</h4>
            <p>👤 rose / PopoDarling</p>
            <p>👤 momo / 242424</p>
            <p>👤 0000 / admin</p>
        </div>
    </div>
    
    <script>
        // User credentials database
        const users = {
            'rose': {
                password: 'PopoDarling',
                role: 'admin',
                name: 'Rose'
            },
            'momo': {
                password: '242424',
                role: 'admin',
                name: 'Momo'
            },
            '0000': {
                password: 'admin',
                role: 'super_admin',
                name: 'System Admin'
            }
        };
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            // Check if user exists and password matches
            if (users[username] && users[username].password === password) {
                // Store user session
                const userData = {
                    username: username,
                    name: users[username].name,
                    role: users[username].role,
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Log the login activity
                const logs = JSON.parse(localStorage.getItem('activityLogs')) || [];
                logs.push({
                    timestamp: new Date().toLocaleString(),
                    activity: `${users[username].name} (${username}) logged in`
                });
                localStorage.setItem('activityLogs', logs);
                
                // Redirect to admin hub
                window.location.href = 'admin-management.html';
            } else {
                // Show error message
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Invalid username or password. Please check your credentials.';
                
                // Clear password field
                document.getElementById('password').value = '';
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-management.html';
        }
    </script>
</body>
</html>
