<!-- Add Firebase SDKs BEFORE the closing body tag -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-admin-mgmt.js"></script>

<script>
    // Replace existing login function
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error');
        
        // Check if it's Firebase email format
        if (username.includes('@')) {
            const result = await signInWithEmail(username, password);
            if (result.success) {
                sessionStorage.setItem('agentLoggedIn', '1');
                sessionStorage.setItem('bizAdminUnlocked', '1');
                sessionStorage.setItem('bizUserRole', 'admin');
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = result.error || 'Invalid credentials';
            }
        } else {
            // Fallback to old static admin for backward compatibility
            if (username === '0000' && password === 'admin') {
                sessionStorage.setItem('agentLoggedIn', '1');
                sessionStorage.setItem('bizAdminUnlocked', '1');
                sessionStorage.setItem('bizUserRole', 'admin');
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = 'Invalid username or password.';
            }
        }
    }
</script>
